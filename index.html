<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mercadinho Seu Chiquinho</title>
<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f5f5f5;
}
header {
  background: green;
  color: white;
  padding: 15px;
  text-align: center;
}
.container {
  padding: 20px;
}
.produto {
  background: white;
  padding: 15px;
  margin-bottom: 10px;
  border-radius: 10px;
}
button {
  background: green;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 5px;
}
footer {
  background: #222;
  color: white;
  text-align: center;
  padding: 10px;
}
</style>
</head>

<body>

<header>
  <h1>Mercadinho Seu Chiquinho</h1>
  <p>Os melhores preços da sua região!</p>
</header>

<div class="container">

  <div class="produto">
    <h3>Arroz 5kg</h3>
    <p>R$ 25,00</p>
    <button>Comprar</button>
  </div>

  <div class="produto">
    <h3>Feijão 1kg</h3>
    <p>R$ 8,00</p>
    <button>Comprar</button>
  </div>

  <div class="produto">
    <h3>Óleo de soja</h3>
    <p>R$ 7,00</p>
    <button>Comprar</button>
  </div>

</div>

<footer>
  <p>Contato: (coloque seu WhatsApp aqui)</p>
</footer>

</body>
</html>
